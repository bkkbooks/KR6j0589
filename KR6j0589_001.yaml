body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯如是我聞一時世尊在阿耨達池無熱惱龍王宮與大比丘衆四百五十人俱復有師子遊戲菩薩等大菩薩衆具足千人一切皆得陀羅尼十地圓滿得灌頂已位居補處被大甲胄趣諸佛德心不退轉名稱普聞如是等菩薩摩訶薩悉從他方而來集會爾時師子遊戲菩薩摩訶薩從座而起偏袒右肩詣世尊前右膝著地合掌恭肅而白佛言世尊如佛福蘊當云何得又於如來作供養者云何因果無量無邊唯願如來慈悲開示作是説已凝心而住爾時佛告師子遊戲菩薩摩訶薩言善哉善哉善男子汝今問我如來福蘊云何而得又於如來作供養者云何因果無量無邊汝當諦聽今為汝説佛言善男子如來有五法具足功德無量無邊云何五法所謂戒定慧解脫解脫知見善男子如來具足如是五法無量功德是故獲得福蘊無量無邊善男子若於如來作供養者當得涅槃若彼三乘隨其發心各各所見而得涅槃善男子若見如來應正等覺以清淨心諦信歸命尊重稱讚又以衣服臥具病緣醫藥一切所須而供養者所獲果報無量無邊善男子若復如來般涅槃後有得如來舍利如芥子等而供養者所獲果報於一切中最又復作種種福若於如來舍利作供養者其福最上師子遊戲若復有人持於寶聚如妙高山等布施供養聲聞及辟支佛所獲果報不如在家及出家菩薩發無上正等覺心以一金錢布施供養如來應正覺以前方便善根於後方便善根百分不及一千分不及一百千分不及一乃至算分數分譬喻分譬喻轉分乃至算數譬喻所不能及善男子又復如來住世百年千年乃至百千年應化畢已般涅槃後以佛舍利而起妙塔若復有人於此塔所以香泥塗地作曼拏羅施設花鬘塗香燒香然燈志心供養乃至持一花一燈以為供養或持帚拂除去塵坌或以一掬水用為灑淨如是之人以志心故獲福無量是人先世所有罪業當墮阿鼻地獄以於塔所作供養故先世罪報皆悉除滅善男子若復有人發一念心歸命於佛又不中退復不輕慢是人當來於百劫千劫乃至百千劫中常感勝福生於人天不復墮落一切惡趣善男子我今説此花積樓閣陀羅尼經為欲利益安樂天上人間一切衆生故善男子若復有人得此花積樓閣陀羅尼經志心受持讀誦供養又復演彼真實義趣廣為人説是人永不墮一切惡趣亦不生卑下種族常生人天殊勝之處諸根圓滿獲宿命通具足種種甚深辨才恆得值遇佛法僧寶又得如來憶念覆護得菩提心永不退轉爾時世尊即説陀羅尼曰怛儞也二合他引一馱囉尼馱囉尼二母儞引鉢囉二合婆引娑嚩二合哩引三悉地引贊捺哩二合引四曩引他唧儞哩賀二合引哩引五阿引嚕引誐也二合嚩底六沒馱縛底七尾哩引烏迦致囉祖波誐帝引八帝引祖嚩底九尾捨引羅沒地達哩麼二合引嚩婆引細引十阿乞叉二合野羯臘閉二合引十一羯臘波二合嚩底十二阿蜜哩二合哆羯臘閉二合引十三護哆引舍儞引十四帝引祖嚩底儞怛也二合三摩引呬帝引十五帝引祖嚩底底乞叉赧三合捺哩二合野沒地娑嚩二合引賀引十六善男子此陀羅尼乃是十方無量無邊諸佛如來同共宣説若復有人聞此陀羅尼經名字發至誠心恭信供養是人當來獲得無量無邊功德又復若人持此陀羅尼成先行已於二月三月或八月取白月八日起首發至誠心於一晝夜中六時念此陀羅尼及憶念諸佛如來心不散亂復以塗香妙花燒香然燈種種供養心不間斷至十五日決定得見世尊坐蓮華藏座説陀羅尼法持誦之人應時獲得意願圓滿心垢悉除證宿命通得諸禪定住四聖諦解諸法義論及工巧事業乃至臨命終時耳根不壞悉能了別一切勝事乃至或聞如來為説四聖諦等無漏爾時世尊説是陀羅尼經已師子遊戲菩薩摩訶薩及諸大菩薩大比丘衆天人阿修羅乾闥婆等聞佛所説皆大歡喜禮佛而退
